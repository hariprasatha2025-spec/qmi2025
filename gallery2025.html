<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QMI 2025 Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family: Arial, sans-serif;
}

.navbar{
    background-color:#002147;
}

.section-title{
    border-left:4px solid #002147;
    padding-left:10px;
    margin-bottom:30px;
}

.gallery-img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.gallery-img:hover{
    transform:scale(1.03);
}

footer{
    background:#002147;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">QMI 2025 Gallery</span>
    </div>
</nav>

<section class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="section-title mb-0">Event Gallery</h2>

        <!-- Back Button -->
        <a href="pastevents.html" class="btn btn-secondary">
            ← Back to Past Events
        </a>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <img src="gallery1.jpg" class="gallery-img shadow-sm" alt="Gallery Image 1">
        </div>

        <div class="col-md-4">
            <img src="gallery2.jpg" class="gallery-img shadow-sm" alt="Gallery Image 2">
        </div>

        <div class="col-md-4">
            <img src="gallery3.jpg" class="gallery-img shadow-sm" alt="Gallery Image 3">
        </div>

        <div class="col-md-4">
            <img src="gallery4.jpg" class="gallery-img shadow-sm" alt="Gallery Image 4">
        </div>

        <div class="col-md-4">
            <img src="gallery5.jpg" class="gallery-img shadow-sm" alt="Gallery Image 5">
        </div>

        <div class="col-md-4">
            <img src="gallery6.jpg" class="gallery-img shadow-sm" alt="Gallery Image 6">
        </div>

    </div>

</section>

<footer>
    <p>© 2026 QMI Workshop – VIT Chennai | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
